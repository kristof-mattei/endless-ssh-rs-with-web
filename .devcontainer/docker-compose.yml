services:
  devcontainer:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ../:/workspace/vscode/
    depends_on:
      - timescaledb
    network_mode: service:timescaledb
    command: sleep infinity

  timescaledb:
    image: timescale/timescaledb:2.27.1-pg18@sha256:639a43b70247489e618da0351ac7c9ffb139790dc672cd42c50cec60b2a33497
    restart: unless-stopped
    ports:
      - 5432:5432
    env_file:
      - ../.env
    volumes:
      - timescaledb-data:/var/lib/postgresql/
      - ../init-db/:/docker-entrypoint-initdb.d/

volumes:
  timescaledb-data:
